<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JF Tracker">
    
    <title>Joseph Fitness - My Tracker</title>
    
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#151e2e', 855: '#1a2333' }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
                        'slide-in-right': 'slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pop-bounce': 'popBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)'
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { opacity: 0, transform: 'translateY(30px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' }
                        },
                        slideInRight: {
                            '0%': { opacity: 0, transform: 'translateX(20px)' },
                            '100%': { opacity: 1, transform: 'translateX(0)' }
                        },
                        popBounce: {
                            '0%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(0.97)' },
                            '100%': { transform: 'scale(1)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            background-color: #0f172a; 
            color: #f1f5f9; 
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overscroll-behavior-y: none;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        /* Animazione flash verde custom per il completamento serie */
        .glow-success {
            animation: successGlow 0.6s ease-out;
        }
        @keyframes successGlow {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); border-color: rgba(16, 185, 129, 0.8); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); border-color: #1e293b; }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); border-color: #1e293b; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const WORKOUTS = {
          joseph: {
            clientName: 'Joseph',
            accentColor: 'emerald',
            days: [
              {
                name: 'Giorno 1 - Tirata & Bicipiti',
                exercises: [
                  { id: 'j-g1-ex1', name: 'Rematore', sets: '2', reps: '12', rest: '240' },
                  { id: 'j-g1-ex2', name: 'Lat Machine presa neutra', sets: '2', reps: '6', rest: '240' },
                  { id: 'j-g1-ex3', name: 'Face Pull', sets: '2', reps: '12', rest: '240' },
                  { id: 'j-g1-ex4', name: 'Bicipiti cavi seduto', sets: '2', reps: '12', rest: '240' },
                  { id: 'j-g1-ex5', name: 'Martello', sets: '2', reps: '6', rest: '240' },
                  { id: 'j-g1-ex6', name: 'Addominali', sets: '2', reps: '15', rest: '240' }
                ]
              },
              {
                name: 'Giorno 2 - Spalle, Gambe & Cardio',
                exercises: [
                  { id: 'j-g2-ex1', name: 'Military Press', sets: '2', reps: '12', rest: '240' },
                  { id: 'j-g2-ex2', name: 'Alzate frontali cavo', sets: '2', reps: '12', rest: '240' },
                  { id: 'j-g2-ex3', name: 'Leg Extension', sets: '2', reps: '12', rest: '240' },
                  { id: 'j-g2-ex4', name: 'Pressa', sets: '2', reps: '6', rest: '240' },
                  { id: 'j-g2-ex5', name: 'Adduttori', sets: '2', reps: '12', rest: '240' },
                  { id: 'j-g2-ex6', name: 'Addominali', sets: '2', reps: '15', rest: '240' },
                  { id: 'j-g2-ex7', name: 'Camminata 18% pendenza', sets: '1', reps: '5 min', rest: '0' }
                ]
              },
              {
                name: 'Giorno 3 - Petto & Tricipiti',
                exercises: [
                  { id: 'j-g3-ex1', name: 'Croci ai cavi', sets: '2', reps: '12', rest: '240' },
                  { id: 'j-g3-ex2', name: 'Spinte cavi', sets: '2', reps: '6', rest: '240' },
                  { id: 'j-g3-ex3', name: 'Croci cavi bassi', sets: '2', reps: '12', rest: '240' },
                  { id: 'j-g3-ex4', name: 'Pushdown', sets: '2', reps: '12', rest: '240' },
                  { id: 'j-g3-ex5', name: 'Estensione sopra la testa', sets: '2', reps: '12', rest: '240' }
                ]
              }
            ]
          },
          giada: {
            clientName: 'Giada',
            accentColor: 'rose',
            days: [
              {
                name: 'Giorno 1 - Glutei & Quad',
                exercises: [
                  { id: 'g-g1-ex1', name: 'Hip Thrust', sets: '2', reps: '12', rest: '240' },
                  { id: 'g-g1-ex2', name: 'Leg press', sets: '2', reps: '6', rest: '240' },
                  { id: 'g-g1-ex3', name: 'Leg Extension', sets: '2', reps: '12', rest: '240' },
                  { id: 'g-g1-ex4', name: 'Abductor Machine', sets: '2', reps: '6', rest: '240' },
                  { id: 'g-g1-ex5', name: 'Addome cable crunch', sets: '2', reps: '10-12', rest: '240' }
                ]
              },
              {
                name: 'Giorno 2 - Upper Body & Spalle',
                exercises: [
                  { id: 'g-g2-ex1', name: 'Lat Machine', sets: '2', reps: '12', rest: '240' },
                  { id: 'g-g2-ex2', name: 'Seated Row', sets: '2', reps: '12', rest: '240' },
                  { id: 'g-g2-ex3', name: 'Shoulder Press', sets: '2', reps: '12', rest: '240' },
                  { id: 'g-g2-ex4', name: 'Alzate Laterali', sets: '2', reps: '12', rest: '240' },
                  { id: 'g-g2-ex5', name: 'Tricipiti', sets: '2', reps: '6', rest: '240' }
                ]
              },
              {
                name: 'Giorno 3 - Lower Body & Braccia',
                exercises: [
                  { id: 'g-g3-ex1', name: 'Hack Squat', sets: '2', reps: '12', rest: '240' },
                  { id: 'g-g3-ex2', name: 'Hip Thrust', sets: '2', reps: '6', rest: '240' },
                  { id: 'g-g3-ex3', name: 'Leg Curl', sets: '2', reps: '12', rest: '240' },
                  { id: 'g-g3-ex4', name: 'Bicipiti cavi bassi', sets: '2', reps: '6', rest: '240' },
                  { id: 'g-g3-ex5', name: 'Addome cable crunch', sets: '2', reps: '10-12', rest: '240' }
                ]
              }
            ]
          }
        };

        function App() {
          const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('jf_current_user') || null);
          const [activeDayIndex, setActiveDayIndex] = useState(0);
          const [toastMessage, setToastMessage] = useState(null);
          const [gymLogs, setGymLogs] = useState({});
          
          // Stato per le animazioni dinamiche delle schede
          const [animatingCards, setAnimatingCards] = useState({});

          const [timerActive, setTimerActive] = useState(false);
          const [timerDuration, setTimerDuration] = useState(240);
          const [timeLeft, setTimeLeft] = useState(240);
          const timerIntervalRef = useRef(null);

          useEffect(() => {
            if (currentUser) {
              const savedLogs = localStorage.getItem(`jf_logs_${currentUser}`);
              setGymLogs(savedLogs ? JSON.parse(savedLogs) : {});
            }
          }, [currentUser]);

          useEffect(() => {
            if (timerActive && timeLeft > 0) {
              timerIntervalRef.current = setInterval(() => {
                setTimeLeft((prev) => {
                  if (prev <= 1) {
                    clearInterval(timerIntervalRef.current);
                    setTimerActive(false);
                    showToast("⏱️ Recupero terminato! Sotto con la prossima serie!");
                    return 0;
                  }
                  return prev - 1;
                });
              }, 1000);
            } else {
              clearInterval(timerIntervalRef.current);
            }
            return () => clearInterval(timerIntervalRef.current);
          }, [timerActive, timeLeft]);

          const showToast = (msg) => {
            setToastMessage(msg);
            setTimeout(() => setToastMessage(null), 2500);
          };

          const handleLogChange = (exId, setIdx, field, value) => {
            const key = `${exId}-${setIdx}-${field}`;
            setGymLogs(prev => {
              const newLogs = { ...prev, [key]: value };
              localStorage.setItem(`jf_logs_${currentUser}`, JSON.stringify(newLogs));
              return newLogs;
            });
          };

          const startTimer = (seconds, exId) => {
            // Avvia il timer
            setTimerDuration(seconds);
            setTimeLeft(seconds);
            setTimerActive(true);
            
            // Attiva l'animazione di completamento sulla specifica scheda
            if (exId) {
                setAnimatingCards(prev => ({ ...prev, [exId]: true }));
                setTimeout(() => {
                    setAnimatingCards(prev => ({ ...prev, [exId]: false }));
                }, 600); // Rimuove la classe dopo che l'animazione è finita
            }
          };

          const formatTime = (secs) => {
            const mins = Math.floor(secs / 60);
            const rem = secs % 60;
            return `${mins}:${rem < 10 ? '0' : ''}${rem}`;
          };

          const handleLogin = (userKey) => {
            setCurrentUser(userKey);
            localStorage.setItem('jf_current_user', userKey);
            setActiveDayIndex(0);
          };

          const handleLogout = () => {
            setCurrentUser(null);
            localStorage.removeItem('jf_current_user');
            setTimerActive(false);
          };

          if (!currentUser) {
            return (
              <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 animate-slide-up">
                <div className="bg-slate-850 p-8 rounded-3xl shadow-2xl border border-slate-800 w-full max-w-sm text-center space-y-8">
                  <div className="space-y-2">
                    <div className="mx-auto bg-slate-800 w-16 h-16 rounded-2xl flex items-center justify-center mb-4 shadow-inner">
                      <span className="text-3xl">🏋️‍♂️</span>
                    </div>
                    <h1 className="text-2xl font-black text-white tracking-tight">Chi si allena oggi?</h1>
                    <p className="text-sm text-slate-400 font-medium">Seleziona il tuo profilo</p>
                  </div>

                  <div className="space-y-4">
                    <button 
                      onClick={() => handleLogin('joseph')}
                      className="w-full group relative bg-slate-900 border border-slate-700 hover:border-emerald-500 p-4 rounded-2xl flex items-center justify-between active:scale-95 transition-all duration-300 ease-out"
                    >
                      <div className="flex items-center space-x-4">
                        <div className="bg-emerald-500/20 text-emerald-400 w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg transition-transform group-active:scale-90">J</div>
                        <div className="text-left">
                          <h2 className="text-white font-bold text-lg group-hover:text-emerald-400 transition-colors">Joseph</h2>
                          <p className="text-xs text-slate-500 font-medium">3 Giorni Split</p>
                        </div>
                      </div>
                      <span className="text-emerald-400 opacity-0 group-hover:opacity-100 transition-opacity">➔</span>
                    </button>

                    <button 
                      onClick={() => handleLogin('giada')}
                      className="w-full group relative bg-slate-900 border border-slate-700 hover:border-rose-500 p-4 rounded-2xl flex items-center justify-between active:scale-95 transition-all duration-300 ease-out"
                    >
                      <div className="flex items-center space-x-4">
                        <div className="bg-rose-500/20 text-rose-400 w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg transition-transform group-active:scale-90">G</div>
                        <div className="text-left">
                          <h2 className="text-white font-bold text-lg group-hover:text-rose-400 transition-colors">Giada</h2>
                          <p className="text-xs text-slate-500 font-medium">Glutei & Upper</p>
                        </div>
                      </div>
                      <span className="text-rose-400 opacity-0 group-hover:opacity-100 transition-opacity">➔</span>
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          const workoutData = WORKOUTS[currentUser];
          const colorAccent = currentUser === 'joseph' ? 'emerald' : 'rose';
          
          return (
            <div className="min-h-screen bg-slate-900 text-slate-100 font-sans pb-28 select-none animate-slide-up">
              {toastMessage && (
                <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-${colorAccent}-500 text-slate-950 font-black px-6 py-3 rounded-full shadow-2xl border border-${colorAccent}-400 text-xs uppercase tracking-wider animate-pop-bounce`}>
                  {toastMessage}
                </div>
              )}

              <header className="sticky top-0 z-40 bg-slate-900/90 backdrop-blur border-b border-slate-800 px-4 py-3 flex justify-between items-center transition-all">
                <div className="flex items-center space-x-2">
                  <span className={`bg-${colorAccent}-500 text-slate-950 px-2 py-1 rounded-lg font-black text-xs`}>
                    {currentUser === 'joseph' ? 'JF' : 'GF'}
                  </span>
                  <h1 className="text-sm font-bold tracking-tight">Tracker</h1>
                </div>
                <button 
                  onClick={handleLogout}
                  className="text-[11px] font-bold text-slate-300 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 active:scale-95 transition-transform flex items-center space-x-1"
                >
                  <span>👤 Cambia</span>
                </button>
              </header>

              <main className="max-w-md mx-auto px-3 mt-4 space-y-4">
                
                <div className="grid grid-cols-3 gap-1 bg-slate-850 p-1 rounded-xl border border-slate-800">
                  {workoutData.days.map((day, idx) => (
                    <button
                      key={idx}
                      onClick={() => setActiveDayIndex(idx)}
                      className={`py-2.5 text-[11px] font-black rounded-lg transition-colors duration-300 text-center active:scale-95 ${
                        activeDayIndex === idx ? `bg-slate-700 text-${colorAccent}-400 shadow-sm` : 'text-slate-400'
                      }`}
                    >
                      {day.name.split(' - ')[0]}
                    </button>
                  ))}
                </div>

                <h2 className="text-xs font-bold uppercase tracking-widest text-slate-400 px-1">
                  {workoutData.days[activeDayIndex]?.name}
                </h2>

                {/* Sfruttiamo la key dinamica per far scorrere gli esercizi quando cambia il giorno */}
                <div key={activeDayIndex} className="space-y-3 animate-slide-in-right">
                  {workoutData.days[activeDayIndex]?.exercises.map((ex, exIdx) => (
                    <div 
                        key={ex.id} 
                        className={`bg-slate-850 border border-slate-800 rounded-xl p-4 shadow-sm space-y-3 transition-all duration-300 
                        ${animatingCards[ex.id] ? 'glow-success' : ''}`}
                    >
                      
                      <div className="flex justify-between items-baseline">
                        <h3 className="text-sm font-black text-white">{exIdx + 1}. {ex.name}</h3>
                        <span className="text-[11px] font-bold text-slate-400">Target: {ex.sets}x{ex.reps}</span>
                      </div>

                      <div className="space-y-2 pt-2 border-t border-slate-800/60">
                        <div className="grid grid-cols-12 text-[9px] uppercase font-black tracking-wider text-slate-500 text-center">
                          <div className="col-span-2 text-left">Set</div>
                          <div className="col-span-4">Kg</div>
                          <div className="col-span-3">Reps</div>
                          <div className="col-span-3">Difficoltà</div>
                        </div>

                        {Array.from({ length: parseInt(ex.sets, 10) || 1 }).map((_, setIdx) => {
                          const weightKey = `${ex.id}-${setIdx}-weight`;
                          const repsKey = `${ex.id}-${setIdx}-reps`;
                          const rpeKey = `${ex.id}-${setIdx}-rpe`;
                          
                          return (
                            <div key={setIdx} className="grid grid-cols-12 items-center gap-1.5 bg-slate-900/40 p-1 rounded-lg">
                              <div className="col-span-2 text-xs font-black text-slate-500 text-center">#{setIdx + 1}</div>
                              
                              <div className="col-span-4 bg-slate-900 border border-slate-700 rounded-md flex items-center px-1 focus-within:border-emerald-500 transition-colors">
                                <input
                                  type="number"
                                  placeholder="-"
                                  value={gymLogs[weightKey] || ''}
                                  onChange={(e) => handleLogChange(ex.id, setIdx, 'weight', e.target.value)}
                                  className={`w-full bg-transparent text-center text-xs font-bold py-1.5 focus:outline-none text-${colorAccent}-400`}
                                />
                                <span className="text-[9px] text-slate-500 font-bold pr-0.5">kg</span>
                              </div>

                              <div className="col-span-3 bg-slate-900 border border-slate-700 rounded-md focus-within:border-blue-400 transition-colors">
                                <input
                                  type="number"
                                  placeholder={ex.reps}
                                  value={gymLogs[repsKey] || ''}
                                  onChange={(e) => handleLogChange(ex.id, setIdx, 'reps', e.target.value)}
                                  className="w-full bg-transparent text-center text-xs font-bold py-1.5 focus:outline-none text-blue-400"
                                />
                              </div>

                              <div className="col-span-3 bg-slate-900 border border-slate-700 rounded-md focus-within:border-amber-400 transition-colors">
                                <select
                                  value={gymLogs[rpeKey] || ''}
                                  onChange={(e) => handleLogChange(ex.id, setIdx, 'rpe', e.target.value)}
                                  className="w-full bg-transparent text-center text-xs font-bold py-1.5 focus:outline-none text-amber-400 appearance-none"
                                >
                                  <option value="">RPE</option>
                                  {[10, 9.5, 9, 8.5, 8, 7.5, 7, 6.5, 6].map(v => (
                                    <option key={v} value={v} className="bg-slate-900 text-white">@{v}</option>
                                  ))}
                                </select>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      
                      {ex.rest !== '0' && (
                        <button 
                          onClick={() => startTimer(parseInt(ex.rest, 10), ex.id)}
                          className="w-full bg-slate-800 border border-slate-700 text-slate-300 py-2 rounded-lg text-[10px] font-bold active:scale-95 active:bg-slate-700 transition-all duration-200 ease-out mt-2"
                        >
                          ⏳ Serie chiusa! Pausa {formatTime(parseInt(ex.rest, 10))}
                        </button>
                      )}
                    </div>
                  ))}
                </div>

                {/* Barra Animata per il Timer */}
                <div className={`fixed bottom-4 left-3 right-3 max-w-md mx-auto bg-slate-850/95 border border-slate-700 p-3 rounded-xl shadow-2xl flex items-center justify-between backdrop-blur-md z-30 transition-transform duration-300 ${timerActive ? 'translate-y-0 scale-100' : 'translate-y-1 opacity-90'}`}>
                  <div>
                    <p className="text-[9px] uppercase tracking-wider font-black text-slate-400">Recupero Attivo</p>
                    <p className={`text-xl font-mono font-black text-${colorAccent}-400`}>{formatTime(timeLeft)}</p>
                  </div>
                  <div className="flex space-x-1.5">
                    <button onClick={() => setTimerActive(!timerActive)} className={`px-4 py-2 text-xs font-black rounded-lg active:scale-95 transition-transform ${timerActive ? 'bg-amber-500 text-slate-950' : `bg-${colorAccent}-500 text-slate-950`}`}>
                      {timerActive ? 'Pausa' : 'Avvia'}
                    </button>
                    <button onClick={() => { setTimerActive(false); setTimeLeft(timerDuration); }} className="bg-slate-900 border border-slate-700 px-3 py-2 text-xs font-bold rounded-lg text-slate-400 active:scale-95 transition-transform">Reset</button>
                  </div>
                </div>

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
